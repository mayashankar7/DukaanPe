server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:authdb}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: ${JWT_SECRET:dukaanpe-super-secret-key-for-jwt-token-generation-must-be-at-least-512-bits-long-for-hs512-algorithm-to-work}
  expiration: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  allow-fixed-otp: ${JWT_ALLOW_FIXED_OTP:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  jpa:
    show-sql: true

jwt:
  allow-fixed-otp: ${JWT_ALLOW_FIXED_OTP:true}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dukaanpe_auth}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:dukaanpe}
    password: ${SPRING_DATASOURCE_PASSWORD:dukaanpe}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

