server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: store-service
          uri: ${STORE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/stores/**

        - id: product-inventory-service
          uri: ${PRODUCT_INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/products/**, /api/inventory/**

        - id: billing-pos-service
          uri: ${BILLING_POS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/bills/**, /api/pos/**

        - id: udhar-khata-service
          uri: ${UDHAR_KHATA_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/khata/**, /api/udhar/**

        - id: supplier-purchase-service
          uri: ${SUPPLIER_PURCHASE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/suppliers/**, /api/purchase-orders/**, /api/grn/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/payments/**

        - id: customer-loyalty-service
          uri: ${CUSTOMER_LOYALTY_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/customers/**, /api/loyalty/**

        - id: gst-tax-service
          uri: ${GST_TAX_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/gst/**, /api/tax/**

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/analytics/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/notifications/**

        - id: language-service
          uri: ${LANGUAGE_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/language/**

        - id: sync-offline-service
          uri: ${SYNC_OFFLINE_SERVICE_URL:http://localhost:8093}
          predicates:
            - Path=/api/sync/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
  metrics:
    tags:
      service: ${spring.application.name}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}]"

